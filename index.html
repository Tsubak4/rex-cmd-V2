<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rex's Diner - FlashFA</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --marine-deep: #0a0a0a;
        --marine-medium: #1a1a2e;
        --marine-light: #16213e;
        --neon-cyan: #00ffff;
        --neon-red: #ff0055;
        --neon-red-light: #ff3366;
        --white: #ffffff;
        --dark-bg: #0a0a0a;
      }

      body {
        font-family: "Roboto", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: url("assets/rex.png") center/cover fixed no-repeat;
        color: #fff;
        position: relative;
        overflow-x: hidden;
        border: 3px solid var(--neon-cyan);
        box-shadow:
          0 0 20px var(--neon-cyan),
          inset 0 0 20px var(--neon-cyan);
      }

      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.65);
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 0, 85, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      nav {
        background: rgba(10, 10, 10, 0.85);
        backdrop-filter: blur(10px);
        border-bottom: 3px solid var(--neon-cyan);
        box-shadow: 0 5px 25px var(--neon-cyan);
        padding: 1rem 2rem;
        position: fixed;
        width: 100%;
        z-index: 100;
      }

      .nav-container {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 1rem;
        animation: neonPulse 2s infinite ease-in-out;
      }

      .logo img {
        height: 50px;
        width: auto;
        filter: drop-shadow(0 0 10px var(--neon-cyan));
        transition: all 0.3s ease;
      }

      .logo img:hover {
        filter: drop-shadow(0 0 20px var(--neon-cyan));
        transform: scale(1.05);
      }

      @keyframes neonPulse {
        0%,
        100% {
          filter: drop-shadow(0 0 5px var(--neon-cyan));
        }
        50% {
          filter: drop-shadow(0 0 20px var(--neon-cyan));
        }
      }

      .logo-text {
        font-size: 2rem;
        font-weight: 800;
        font-family: "Orbitron", sans-serif;
        background: linear-gradient(
          to bottom,
          var(--neon-cyan) 0%,
          var(--neon-red) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
        position: relative;
      }

      .logo-text::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--neon-cyan),
          var(--neon-red),
          transparent
        );
        box-shadow: 0 0 20px var(--neon-cyan);
      }

      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }

      .nav-links a {
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border-radius: 30px;
        transition: all 0.3s ease;
        position: relative;
        text-shadow: 0 0 10px var(--neon-cyan);
      }

      .nav-links a::before {
        content: "";
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 2px;
        background: var(--neon-red);
        box-shadow: 0 0 20px var(--neon-red);
        transition: width 0.3s ease;
      }

      .nav-links a:hover::before {
        width: 70%;
      }

      .nav-links a:hover {
        text-shadow:
          0 0 20px var(--neon-cyan),
          0 0 40px var(--neon-red);
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 6rem 2rem 4rem;
        position: relative;
        z-index: 10;
      }

      .hero {
        text-align: center;
        max-width: 1200px;
        margin: 0 auto;
        border: 2px solid var(--neon-cyan);
        border-radius: 50px;
        padding: 3rem;
        box-shadow:
          0 0 50px var(--neon-cyan),
          inset 0 0 30px rgba(0, 255, 255, 0.3);
        backdrop-filter: blur(5px);
        background: rgba(0, 0, 0, 0.6);
      }

      .hero h1 {
        font-family: "Orbitron", sans-serif;
        font-size: clamp(3rem, 8vw, 6rem);
        font-weight: 800;
        margin-bottom: 1.5rem;
        text-transform: uppercase;
        letter-spacing: 4px;
        animation: fadeInUp 1s ease;
        background: linear-gradient(
          to bottom,
          var(--neon-cyan) 0%,
          var(--neon-red) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        position: relative;
        text-shadow: none;
      }

      .hero h1::before {
        content: "🍔";
        position: absolute;
        left: -60px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 4rem;
        opacity: 0.7;
        animation: swing 4s infinite ease-in-out;
        text-shadow: 0 0 30px var(--neon-red);
      }

      .hero h1::after {
        content: "🍟";
        position: absolute;
        right: -60px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 4rem;
        opacity: 0.7;
        animation: swing 4s infinite ease-in-out reverse;
        text-shadow: 0 0 30px var(--neon-cyan);
      }

      .hero p {
        font-size: 1.3rem;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 3rem;
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.8;
        animation: fadeInUp 1s ease 0.2s both;
        text-shadow: 0 2px 10px rgba(0, 255, 255, 0.3);
        backdrop-filter: blur(5px);
        padding: 1.5rem;
        border-radius: 20px;
        background: rgba(0, 255, 255, 0.1);
        border: 1px solid var(--neon-cyan);
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
      }

      .btn-connexion {
        position: relative;
        padding: 1.2rem 3.5rem;
        font-size: 1.3rem;
        font-weight: 600;
        font-family: "Orbitron", sans-serif;
        color: #0a0a0a;
        background: linear-gradient(135deg, var(--neon-cyan), var(--neon-red));
        border: none;
        border-radius: 50px;
        cursor: pointer;
        overflow: hidden;
        transition: all 0.3s ease;
        box-shadow:
          0 10px 40px var(--neon-cyan),
          0 0 0 2px var(--neon-cyan) inset;
        text-transform: uppercase;
        letter-spacing: 2px;
        animation: fadeInUp 1s ease 0.3s both;
      }

      .btn-connexion::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent
        );
        transition: left 0.5s ease;
      }

      .btn-connexion:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow:
          0 20px 50px var(--neon-red),
          0 0 0 4px #ffffff inset;
      }

      .btn-connexion:hover::before {
        left: 100%;
      }

      .btn-connexion:active {
        transform: translateY(0) scale(0.95);
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal-container {
        position: relative;
        z-index: 1001;
        width: 100%;
        max-width: 400px;
        padding: 30px;
        background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
        border: 3px solid var(--neon-cyan);
        border-radius: 15px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.7),
          0 0 30px var(--neon-cyan);
        transform: scale(0.9);
        animation: modalAppear 0.3s ease forwards;
      }

      @keyframes modalAppear {
        from {
          transform: scale(0.9);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .modal-title {
        font-family: "Orbitron", sans-serif;
        font-size: 2rem;
        color: #fff;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-align: center;
        background: linear-gradient(
          to bottom,
          var(--neon-cyan) 0%,
          var(--neon-red) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        position: relative;
      }

      .modal-title::after {
        content: "";
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 50%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--neon-cyan),
          var(--neon-red),
          transparent
        );
        border-radius: 2px;
        box-shadow: 0 0 10px var(--neon-cyan);
      }

      .close-modal {
        position: absolute;
        top: 15px;
        right: 20px;
        background: transparent;
        border: 2px solid var(--neon-cyan);
        color: var(--neon-cyan);
        width: 35px;
        height: 35px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 15px var(--neon-cyan);
      }

      .close-modal:hover {
        background: var(--neon-red);
        color: #fff;
        transform: rotate(90deg);
        box-shadow: 0 0 25px var(--neon-red);
        border-color: var(--neon-red);
      }

      .form-group {
        margin-bottom: 20px;
        position: relative;
      }

      .form-group label {
        display: block;
        font-family: "Orbitron", sans-serif;
        color: var(--neon-cyan);
        margin-bottom: 8px;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-shadow: 0 0 10px var(--neon-cyan);
      }

      .input-container {
        position: relative;
      }

      .input-container i {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--neon-cyan);
        font-size: 1.1rem;
        text-shadow: 0 0 5px var(--neon-cyan);
        z-index: 2;
      }

      .input-container input {
        width: 100%;
        padding: 12px 12px 12px 40px;
        background: rgba(10, 10, 10, 0.8);
        border: 2px solid var(--neon-cyan);
        border-radius: 8px;
        color: #fff;
        font-size: 0.9rem;
        font-family: "Roboto", sans-serif;
        transition: all 0.3s ease;
        outline: none;
      }

      .input-container input:focus {
        border-color: var(--neon-red);
        background: rgba(10, 10, 10, 0.9);
        box-shadow: 0 0 15px var(--neon-red);
      }

      .input-container input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background: rgba(0, 255, 255, 0.1);
        border: 2px solid var(--neon-cyan);
        border-radius: 8px;
        color: #fff;
        font-family: "Orbitron", sans-serif;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        text-shadow: 0 0 10px var(--neon-cyan);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 20px var(--neon-cyan);
      }

      .btn-login:hover {
        background: rgba(255, 0, 85, 0.2);
        box-shadow: 0 0 25px var(--neon-red);
        border-color: var(--neon-red);
        transform: translateY(-2px);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .btn-login::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 0, 85, 0.2),
          transparent
        );
        transition: left 0.5s ease;
      }

      .btn-login:hover::before {
        left: 100%;
      }

      .message {
        margin-top: 15px;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-family: "Roboto", sans-serif;
        font-size: 0.9rem;
        display: none;
        border: 2px solid;
      }

      .message.success {
        display: block;
        background: rgba(0, 255, 255, 0.1);
        border-color: var(--neon-cyan);
        color: var(--neon-cyan);
        text-shadow: 0 0 5px var(--neon-cyan);
      }

      .message.error {
        display: block;
        background: rgba(255, 0, 85, 0.1);
        border-color: var(--neon-red);
        color: var(--neon-red-light);
        text-shadow: 0 0 5px rgba(255, 0, 85, 0.5);
      }

      .loading {
        display: none;
        text-align: center;
        margin-top: 15px;
      }

      .loading-spinner {
        display: inline-block;
        width: 25px;
        height: 25px;
        border: 2px solid rgba(0, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: var(--neon-cyan);
        animation: spin 1s ease-in-out infinite;
        margin-right: 8px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      footer {
        background: rgba(10, 10, 10, 0.8);
        backdrop-filter: blur(10px);
        padding: 2rem;
        text-align: center;
        position: relative;
        z-index: 20;
        border-top: 3px solid var(--neon-cyan);
        box-shadow: 0 -5px 25px var(--neon-cyan);
      }

      .footer-content {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
      }

      .copyright {
        color: rgba(255, 255, 255, 0.9);
        font-size: 1rem;
        text-shadow: 0 0 15px var(--neon-cyan);
        letter-spacing: 1px;
        text-align: center;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes swing {
        0%,
        100% {
          transform: translateY(-50%) rotate(-10deg);
        }
        50% {
          transform: translateY(-50%) rotate(10deg);
        }
      }

      @media (max-width: 768px) {
        .hero h1::before,
        .hero h1::after {
          display: none;
        }

        .footer-content {
          flex-direction: column;
          text-align: center;
          justify-content: center;
        }

        .btn-connexion {
          padding: 1rem 2.5rem;
          font-size: 1.1rem;
        }

        .hero {
          padding: 1.5rem;
        }

        .modal-container {
          margin: 20px;
          padding: 20px;
        }

        .logo-text {
          font-size: 1.2rem;
        }

        .logo img {
          height: 35px;
        }
      }

      .glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(0, 255, 255, 0.15) 0%,
          rgba(255, 0, 85, 0.05) 50%,
          transparent 70%
        );
        border-radius: 50%;
        pointer-events: none;
        z-index: 2;
        filter: blur(50px);
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-container">
        <div class="logo">
          <img src="assets/logo.png" alt="Rex's Diner Logo" />
          <span class="logo-text">REX'S DINER</span>
        </div>
        <ul class="nav-links">
          <li><a href="index.html">Accueil</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>

    <div class="glow"></div>

    <main>
      <div class="hero">
        <h1>REX'S DINER</h1>
        <p>
          🍔 Le meilleur du burger dans une ambiance rétro unique 🍟<br />
          Livraison et à emporter
        </p>

        <button class="btn-connexion" id="openLoginModal">
          🍔 Espace Entreprise 🍔
        </button>
      </div>
    </main>

    <div class="modal-overlay" id="loginModal">
      <div class="modal-container">
        <button class="close-modal" id="closeModal">
          <i class="fas fa-times"></i>
        </button>

        <h2 class="modal-title">CONNEXION</h2>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-container">
              <i class="fas fa-user"></i>
              <input
                type="email"
                id="email"
                placeholder="client@rex.com"
                required
                autocomplete="off"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="input-container">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
                autocomplete="off"
              />
            </div>
          </div>

          <button type="submit" class="btn-login" id="loginBtn">
            <span id="btnText">SE CONNECTER</span>
            <div class="loading" id="btnLoading">
              <div class="loading-spinner"></div>
              Connexion...
            </div>
          </button>

          <div class="message" id="message"></div>
        </form>

        <div class="copyright" style="margin-top: 20px; font-size: 0.8rem">
          Accès réservé aux Entreprises
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-content">
        <div class="copyright">© 2026 Rex's Diner - Tous droits réservés.</div>
      </div>
    </footer>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDyjqlNqTG557-mWi9FkzJfzbUeOLQIdlQ",
        authDomain: "rex-commande-v2.firebaseapp.com",
        projectId: "rex-commande-v2",
        storageBucket: "rex-commande-v2.firebasestorage.app",
        messagingSenderId: "1068816796583",
        appId: "1:1068816796583:web:480ed3b69c1bd636488482",
      };

      const app = firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      const ADMIN_EMAIL = "admin@rex.com";

      const modalOverlay = document.getElementById("loginModal");
      const openModalBtn = document.getElementById("openLoginModal");
      const closeModalBtn = document.getElementById("closeModal");
      const loginForm = document.getElementById("loginForm");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const btnText = document.getElementById("btnText");
      const btnLoading = document.getElementById("btnLoading");
      const messageDiv = document.getElementById("message");

      auth.onAuthStateChanged((user) => {
        if (user) {
          const userEmail = user.email ? user.email.toLowerCase().trim() : "";
          const adminEmailLower = ADMIN_EMAIL.toLowerCase().trim();

          if (userEmail === adminEmailLower) {
            window.location.href = "dashboard.html";
          } else {
            window.location.href = "commande.html";
          }
        }
      });

      openModalBtn.addEventListener("click", function () {
        modalOverlay.style.display = "flex";
        document.body.style.overflow = "hidden";
        emailInput.focus();
        setTimeout(() => {
          emailInput.value = "";
          passwordInput.value = "";
        }, 100);
      });

      function closeModal() {
        modalOverlay.style.display = "none";
        document.body.style.overflow = "auto";
        messageDiv.style.display = "none";
        messageDiv.className = "message";
      }

      closeModalBtn.addEventListener("click", closeModal);

      modalOverlay.addEventListener("click", function (e) {
        if (e.target === modalOverlay) {
          closeModal();
        }
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && modalOverlay.style.display === "flex") {
          closeModal();
        }
      });

      function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = "message " + type;
      }

      function showLoading(show) {
        if (show) {
          btnText.style.display = "none";
          btnLoading.style.display = "inline-block";
          loginBtn.disabled = true;
        } else {
          btnText.style.display = "inline";
          btnLoading.style.display = "none";
          loginBtn.disabled = false;
        }
      }

      loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showMessage("Veuillez remplir tous les champs", "error");
          return;
        }

        showLoading(true);
        showMessage("", "");

        try {
          const userCredential = await auth.signInWithEmailAndPassword(
            email,
            password,
          );
          const user = userCredential.user;
          const userEmail = user.email ? user.email.toLowerCase().trim() : "";
          const adminEmailLower = ADMIN_EMAIL.toLowerCase().trim();

          if (userEmail === adminEmailLower) {
            showMessage("Connexion admin réussie ! Redirection...", "success");
          } else {
            showMessage("Connexion réussie ! Redirection...", "success");
          }

          setTimeout(() => {
            closeModal();
            if (userEmail === adminEmailLower) {
              window.location.href = "dashboard.html";
            } else {
              window.location.href = "commande.html";
            }
          }, 1500);
        } catch (error) {
          console.error("Erreur de connexion:", error);

          let errorMessage = "Email ou mot de passe incorrect";

          switch (error.code) {
            case "auth/user-not-found":
              errorMessage = "Aucun compte trouvé avec cet email";
              break;
            case "auth/wrong-password":
              errorMessage = "Mot de passe incorrect";
              break;
            case "auth/invalid-email":
              errorMessage = "Format d'email invalide";
              break;
            case "auth/user-disabled":
              errorMessage = "Ce compte a été désactivé";
              break;
            case "auth/too-many-requests":
              errorMessage = "Trop de tentatives. Réessayez plus tard";
              break;
            case "auth/network-request-failed":
              errorMessage = "Erreur réseau. Vérifiez votre connexion";
              break;
          }

          showMessage(errorMessage, "error");
          showLoading(false);
          passwordInput.value = "";
          passwordInput.focus();
        }
      });

      document.addEventListener("DOMContentLoaded", function () {
        const hero = document.querySelector(".hero");
        hero.style.opacity = "0";
        hero.style.transform = "translateY(30px)";
        hero.style.transition = "all 0.8s ease";

        setTimeout(() => {
          hero.style.opacity = "1";
          hero.style.transform = "translateY(0)";
        }, 200);
      });
    </script>
  </body>
</html>
