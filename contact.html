<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rex's Diner - FlashFA</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --marine-deep: #0a0a0a;
        --marine-medium: #1a1a2e;
        --marine-light: #16213e;
        --neon-cyan: #00ffff;
        --neon-red: #ff0055;
        --neon-red-light: #ff3366;
        --white: #ffffff;
        --dark-bg: #0a0a0a;
      }

      body {
        font-family: "Roboto", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: url("assets/rex.png") center/cover fixed no-repeat;
        color: #fff;
        position: relative;
        overflow-x: hidden;
        border: 3px solid var(--neon-cyan);
        box-shadow:
          0 0 20px var(--neon-cyan),
          inset 0 0 20px var(--neon-cyan);
      }

      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.65);
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 0, 85, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      nav {
        background: rgba(10, 10, 10, 0.85);
        backdrop-filter: blur(10px);
        border-bottom: 3px solid var(--neon-cyan);
        box-shadow: 0 5px 25px var(--neon-cyan);
        padding: 1rem 2rem;
        position: fixed;
        width: 100%;
        z-index: 100;
      }

      .nav-container {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 1rem;
        animation: neonPulse 2s infinite ease-in-out;
      }

      .logo img {
        height: 50px;
        width: auto;
        filter: drop-shadow(0 0 10px var(--neon-cyan));
        transition: all 0.3s ease;
      }

      .logo img:hover {
        filter: drop-shadow(0 0 20px var(--neon-cyan));
        transform: scale(1.05);
      }

      @keyframes neonPulse {
        0%,
        100% {
          filter: drop-shadow(0 0 5px var(--neon-cyan));
        }
        50% {
          filter: drop-shadow(0 0 20px var(--neon-cyan));
        }
      }

      .logo-text {
        font-size: 2rem;
        font-weight: 800;
        font-family: "Orbitron", sans-serif;
        background: linear-gradient(
          to bottom,
          var(--neon-cyan) 0%,
          var(--neon-red) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
        position: relative;
      }

      .logo-text::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--neon-cyan),
          var(--neon-red),
          transparent
        );
        box-shadow: 0 0 20px var(--neon-cyan);
      }

      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }

      .nav-links a {
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border-radius: 30px;
        transition: all 0.3s ease;
        position: relative;
        text-shadow: 0 0 10px var(--neon-cyan);
      }

      .nav-links a::before {
        content: "";
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 2px;
        background: var(--neon-red);
        box-shadow: 0 0 20px var(--neon-red);
        transition: width 0.3s ease;
      }

      .nav-links a:hover::before {
        width: 70%;
      }

      .nav-links a:hover {
        text-shadow:
          0 0 20px var(--neon-cyan),
          0 0 40px var(--neon-red);
      }

      main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 6rem 2rem 4rem;
        position: relative;
        z-index: 10;
        width: 100%;
      }

      .content-wrapper {
        width: 50%;
        max-width: 700px;
        margin: 0 auto;
      }

      .page-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .page-header h1 {
        font-family: "Orbitron", sans-serif;
        font-size: 2.5rem;
        margin-bottom: 0.8rem;
        background: linear-gradient(
          to bottom,
          var(--neon-cyan) 0%,
          var(--neon-red) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 30px var(--neon-cyan);
      }

      .page-header p {
        color: var(--neon-cyan);
        font-size: 1rem;
        text-shadow: 0 0 10px var(--neon-cyan);
      }

      .contact-form-container {
        background: rgba(10, 10, 10, 0.6);
        backdrop-filter: blur(10px);
        border: 2px solid var(--neon-cyan);
        border-radius: 15px;
        padding: 2rem;
        box-shadow: 0 0 30px var(--neon-cyan);
      }

      .contact-form-container h2 {
        font-family: "Orbitron", sans-serif;
        background: linear-gradient(
          to bottom,
          var(--neon-cyan) 0%,
          var(--neon-red) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1.5rem;
        text-align: center;
        font-size: 1.5rem;
        text-shadow: 0 0 15px var(--neon-cyan);
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .form-group {
        position: relative;
        margin-bottom: 1rem;
      }

      .form-group label {
        display: block;
        font-family: "Orbitron", sans-serif;
        color: var(--neon-cyan);
        margin-bottom: 5px;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-shadow: 0 0 10px var(--neon-cyan);
      }

      .input-container {
        position: relative;
      }

      .input-container i {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--neon-cyan);
        font-size: 1rem;
        text-shadow: 0 0 5px var(--neon-cyan);
        z-index: 2;
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 10px 10px 10px 35px;
        background: rgba(10, 10, 10, 0.8);
        border: 2px solid var(--neon-cyan);
        border-radius: 8px;
        color: #fff;
        font-size: 0.9rem;
        font-family: "Roboto", sans-serif;
        transition: all 0.3s ease;
        outline: none;
      }

      .form-group textarea {
        padding: 10px 10px 10px 35px;
        resize: vertical;
        min-height: 100px;
      }

      .form-group input:focus,
      .form-group textarea:focus,
      .form-group select:focus {
        border-color: var(--neon-red);
        background: rgba(10, 10, 10, 0.9);
        box-shadow: 0 0 15px var(--neon-red);
      }

      .radio-group {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        margin: 1rem 0;
        padding: 0.8rem;
        background: rgba(0, 255, 255, 0.05);
        border-radius: 8px;
      }

      .radio-option {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .radio-option input[type="radio"] {
        width: 16px;
        height: 16px;
        accent-color: var(--neon-cyan);
      }

      .radio-option label {
        color: #fff;
        font-family: "Orbitron", sans-serif;
        font-size: 0.8rem;
        text-shadow: 0 0 5px var(--neon-cyan);
      }

      .btn-submit {
        width: 100%;
        padding: 12px;
        background: rgba(0, 255, 255, 0.1);
        border: 2px solid var(--neon-cyan);
        border-radius: 8px;
        color: #fff;
        font-family: "Orbitron", sans-serif;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-shadow: 0 0 10px var(--neon-cyan);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 20px var(--neon-cyan);
        margin-top: 1rem;
      }

      .btn-submit:hover:not(:disabled) {
        background: rgba(255, 0, 85, 0.2);
        box-shadow: 0 0 25px var(--neon-red);
        border-color: var(--neon-red);
        transform: translateY(-2px);
      }

      .btn-submit::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 0, 85, 0.2),
          transparent
        );
        transition: left 0.5s ease;
      }

      .btn-submit:hover::before {
        left: 100%;
      }

      .btn-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .message {
        margin-top: 1rem;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
        font-family: "Roboto", sans-serif;
        font-size: 0.9rem;
        display: none;
        border: 2px solid;
      }

      .message.error {
        display: block;
        background: rgba(255, 0, 85, 0.1);
        border-color: var(--neon-red);
        color: var(--neon-red-light);
        text-shadow: 0 0 5px rgba(255, 0, 85, 0.5);
      }

      .cooldown-warning {
        text-align: center;
        font-size: 0.75rem;
        color: var(--neon-red-light);
        margin-top: 10px;
        font-style: italic;
      }

      .separator {
        margin: 1.5rem 0;
        position: relative;
        text-align: center;
      }

      .separator-line {
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--neon-cyan),
          var(--neon-red),
          transparent
        );
        box-shadow: 0 0 15px var(--neon-cyan);
        width: 100%;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal-container {
        position: relative;
        z-index: 2001;
        width: 100%;
        max-width: 400px;
        padding: 30px;
        background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
        border: 3px solid var(--neon-cyan);
        border-radius: 15px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.7),
          0 0 30px var(--neon-cyan);
        transform: scale(0.9);
        animation: modalAppear 0.3s ease forwards;
        text-align: center;
      }

      @keyframes modalAppear {
        from {
          transform: scale(0.9);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .modal-icon {
        font-size: 4rem;
        color: var(--neon-cyan);
        margin-bottom: 1rem;
        text-shadow: 0 0 30px var(--neon-cyan);
        animation: iconPulse 2s infinite;
      }

      @keyframes iconPulse {
        0%,
        100% {
          transform: scale(1);
          text-shadow: 0 0 30px var(--neon-cyan);
        }
        50% {
          transform: scale(1.1);
          text-shadow: 0 0 50px var(--neon-red);
        }
      }

      .modal-title {
        font-family: "Orbitron", sans-serif;
        font-size: 2rem;
        color: #fff;
        margin-bottom: 15px;
        text-transform: uppercase;
        letter-spacing: 2px;
        background: linear-gradient(
          to bottom,
          var(--neon-cyan) 0%,
          var(--neon-red) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .modal-message {
        color: rgba(255, 255, 255, 0.9);
        font-size: 1.1rem;
        margin-bottom: 25px;
        line-height: 1.6;
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
      }

      .modal-btn {
        padding: 12px 30px;
        font-family: "Orbitron", sans-serif;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        border-radius: 8px;
        border: 2px solid var(--neon-cyan);
        background: rgba(0, 255, 255, 0.1);
        color: #fff;
        text-shadow: 0 0 10px var(--neon-cyan);
        box-shadow: 0 0 20px var(--neon-cyan);
      }

      .modal-btn:hover {
        background: rgba(255, 0, 85, 0.2);
        box-shadow: 0 0 30px var(--neon-red);
        border-color: var(--neon-red);
        transform: translateY(-2px);
      }

      footer {
        background: rgba(10, 10, 10, 0.8);
        backdrop-filter: blur(10px);
        padding: 1.5rem;
        text-align: center;
        position: relative;
        z-index: 20;
        border-top: 3px solid var(--neon-cyan);
        box-shadow: 0 -5px 25px var(--neon-cyan);
      }

      .footer-content {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .copyright {
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.9rem;
        text-shadow: 0 0 15px var(--neon-cyan);
        letter-spacing: 1px;
        text-align: center;
      }

      .glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(0, 255, 255, 0.15) 0%,
          rgba(255, 0, 85, 0.05) 50%,
          transparent 70%
        );
        border-radius: 50%;
        pointer-events: none;
        z-index: 2;
        filter: blur(50px);
      }

      @media (max-width: 1200px) {
        .content-wrapper {
          width: 60%;
        }
      }

      @media (max-width: 992px) {
        .content-wrapper {
          width: 70%;
        }
      }

      @media (max-width: 768px) {
        .content-wrapper {
          width: 90%;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .page-header h1 {
          font-size: 1.8rem;
        }

        .radio-group {
          flex-direction: column;
          gap: 8px;
        }

        .logo-text {
          font-size: 1.2rem;
        }

        .logo img {
          height: 35px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-container">
        <div class="logo">
          <img src="assets/logo.png" alt="Rex's Diner Logo" />
          <span class="logo-text">REX'S DINER</span>
        </div>
        <ul class="nav-links">
          <li><a href="index.html">Accueil</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>

    <div class="glow"></div>

    <main>
      <div class="content-wrapper">
        <div class="page-header">
          <h1>NOUS CONTACTER</h1>
          <p>🍔 Une question ? Une réservation ? Écrivez-nous ! 🍟</p>
        </div>

        <div id="notification" class="message" style="display: none"></div>

        <div class="contact-form-container">
          <h2><i class="fas fa-envelope"></i> FORMULAIRE DE CONTACT</h2>

          <form id="contactForm">
            <div class="form-grid">
              <div class="form-group">
                <label for="nom">Nom</label>
                <div class="input-container">
                  <i class="fas fa-user"></i>
                  <input
                    type="text"
                    id="nom"
                    placeholder="Votre nom"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label for="prenom">Prénom</label>
                <div class="input-container">
                  <i class="fas fa-user"></i>
                  <input
                    type="text"
                    id="prenom"
                    placeholder="Votre prénom"
                    required
                  />
                </div>
              </div>
            </div>

            <div class="form-group">
              <label for="telephone">Téléphone</label>
              <div class="input-container">
                <i class="fas fa-phone"></i>
                <input
                  type="tel"
                  id="telephone"
                  placeholder="06 12 34 56 78"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="sujet">Sujet</label>
              <div class="input-container">
                <i class="fas fa-tag"></i>
                <input
                  type="text"
                  id="sujet"
                  placeholder="Sujet de votre message"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <div class="input-container">
                <i class="fas fa-comment"></i>
                <textarea
                  id="message"
                  placeholder="Votre message..."
                  required
                ></textarea>
              </div>
            </div>

            <div class="separator">
              <div class="separator-line"></div>
            </div>

            <div class="form-group">
              <label>Nature de la demande</label>
              <div class="radio-group">
                <div class="radio-option">
                  <input
                    type="radio"
                    id="typeReservation"
                    name="demandeType"
                    value="reservation"
                    checked
                  />
                  <label for="typeReservation"
                    ><i class="fas fa-calendar"></i> Réservation</label
                  >
                </div>
                <div class="radio-option">
                  <input
                    type="radio"
                    id="typeInfo"
                    name="demandeType"
                    value="information"
                  />
                  <label for="typeInfo"
                    ><i class="fas fa-info-circle"></i> Information</label
                  >
                </div>
                <div class="radio-option">
                  <input
                    type="radio"
                    id="typeReclamation"
                    name="demandeType"
                    value="reclamation"
                  />
                  <label for="typeReclamation"
                    ><i class="fas fa-exclamation-triangle"></i>
                    Réclamation</label
                  >
                </div>
                <div class="radio-option">
                  <input
                    type="radio"
                    id="typeAutre"
                    name="demandeType"
                    value="autre"
                  />
                  <label for="typeAutre"
                    ><i class="fas fa-question-circle"></i> Autre</label
                  >
                </div>
              </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
              <i class="fas fa-paper-plane"></i> ENVOYER
            </button>

            <div class="cooldown-warning">
              <i class="fas fa-clock"></i> 1 message toutes les 6h
            </div>
          </form>
        </div>
      </div>
    </main>

    <div class="modal-overlay" id="successModal">
      <div class="modal-container">
        <div class="modal-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <h2 class="modal-title">ENVOYÉ !</h2>
        <div class="modal-message">
          🍔 Merci pour votre message !<br />
          Nous vous répondrons dans les plus brefs délais.<br />
          🍟
        </div>
        <button class="modal-btn" id="closeModalBtn">
          <i class="fas fa-check"></i> FERMER
        </button>
      </div>
    </div>

    <footer>
      <div class="footer-content">
        <div class="copyright">© 2026 Rex's Diner - Tous droits réservés.</div>
      </div>
    </footer>

    <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 
    </script>
  </body>
</html>
